<mat-sidenav-container
  class="layout-shell"
  [class.is-handset]="isHandset()"
  [class.sidebar-open]="!isHandset() && !isSidebarCollapsed()"
  [class.sidebar-collapsed]="isSidebarCollapsed()"
  [class.is-collapsed]="isSidebarCollapsed()"
  [hasBackdrop]="isHandset()"
  [autosize]="!isHandset()"
  (backdropClick)="closeMobileSidebar()"
>
  <mat-sidenav
    class="sidebar"
    [class.sidebar-collapsed]="isSidebarCollapsed()"
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    [fixedInViewport]="isHandset()"
    [disableClose]="!isHandset()"
    [autoFocus]="false"
  >
    <div class="sidebar-inner">
      <div class="brand-block">
        <div class="brand-logo">BS</div>
        <div class="brand-copy">
          <p class="brand-title">Ben's Services</p>
          <p class="brand-subtitle">Provider Platform</p>
        </div>
      </div>

      <mat-nav-list class="nav-list">
        @for (item of navItems; track item.route) {
          <a
            mat-list-item
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active-nav-link"
            [attr.aria-label]="item.label"
            (click)="closeMobileSidebar()"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            @if (!isSidebarCollapsed()) {
              <span matListItemTitle>{{ item.label }}</span>
            }
          </a>
        }
      </mat-nav-list>

      @if (!isSidebarCollapsed()) {
        <div class="sidebar-footer">
          <mat-icon>insights</mat-icon>
          <p>Track coverage and launch readiness by market in one workspace.</p>
        </div>
      }
    </div>
  </mat-sidenav>

  <mat-sidenav-content
    class="shell-content"
    [class.main-content-expanded]="!isHandset() && !isSidebarCollapsed()"
    [class.main-content-collapsed]="isSidebarCollapsed()"
  >
    <mat-toolbar class="topbar">
      <div class="topbar-leading">
        <button
          mat-icon-button
          class="sidebar-toggle"
          (click)="toggleSidebar()"
          [attr.aria-label]="sidebarToggleAriaLabel()"
        >
          <mat-icon>{{ sidebarToggleIcon() }}</mat-icon>
        </button>

        <div class="topbar-context">
          <p>Workspace</p>
          <h2>{{ activeSection() }}</h2>
        </div>
      </div>

      <form class="topbar-search" (ngSubmit)="onSearch()" role="search">
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
          <mat-icon matPrefix>search</mat-icon>
          <input
            matInput
            [formControl]="searchControl"
            placeholder="Quick search provider, city or region"
            aria-label="Quick search"
          />
        </mat-form-field>
      </form>

      <div class="topbar-actions">
        <button mat-icon-button matBadge="3" matBadgeColor="warn" aria-label="Notifications">
          <mat-icon>notifications</mat-icon>
        </button>

        <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-button">
          <mat-icon>account_circle</mat-icon>
          <span>{{ profileDisplayName() }}</span>
        </button>
        <mat-menu #profileMenu="matMenu">
          <button mat-menu-item routerLink="/settings">
            <mat-icon>settings</mat-icon>
            <span>Settings</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sign out</span>
          </button>
        </mat-menu>
      </div>
    </mat-toolbar>

    <main class="content-area">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
