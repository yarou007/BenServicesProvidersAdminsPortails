<section class="login-shell">
  <mat-card class="login-card">
    <div class="login-header">
      <div class="logo">BS</div>
      <div>
        <h1>Ben's Services Provider Platform</h1>
        <p>Sign in to manage provider coverage and market readiness.</p>
      </div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="signIn()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>Email or username</mat-label>
        <input matInput formControlName="login" type="text" autocomplete="username" />
        <mat-error *ngIf="loginForm.controls.login.hasError('required')">Login is required.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password" autocomplete="current-password" />
        <mat-error *ngIf="loginForm.controls.password.hasError('required')">Password is required.</mat-error>
        <mat-error *ngIf="loginForm.controls.password.hasError('minlength')">Minimum 8 characters.</mat-error>
      </mat-form-field>

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      }

      <button mat-flat-button color="primary" class="sign-in-button" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </mat-card>
</section>
